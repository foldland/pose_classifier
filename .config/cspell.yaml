# yaml-language-server: $schema=https://raw.githubusercontent.com/streetsidesoftware/cspell/main/packages/cspell-types/cspell.schema.json

version: "0.2"
language: "en"
useGitignore: true
enableGlobDot: false
ignorePaths:
  - "**/l10n/!(en.arb)"
  - "packages/*/example/ios"
  - "packages/*/example/android"
  - "packages/*/example/assets"
dictionaries:
  # cspell - https://github.com/streetsidesoftware/cspell-dicts
  - "bash"
  - "dart"
  - "docker"
  - "en_us"
  - "flutter"
  - "git"
  - "softwareTerms"
  # project
  - "project"
  - "project-tools"
  # custom
  - "foldland"
  - "foldland-tools"
  - "foldland-dart"
  - "foldland-dart-tools"
dictionaryDefinitions:
  # project
  - name: "project"
    path: cspell/project.txt
  - name: "project-tools"
    path: cspell/project-tools.txt
  # base
  - name: "foldland"
    path: https://cspell.foldland.io/v1.25.1/base/misc.txt
  - name: "foldland-tools"
    path: https://cspell.foldland.io/v1.25.1/base/tools.txt
  # dart
  - name: "foldland-dart"
    path: https://cspell.foldland.io/v1.25.1/dart/language.txt
  - name: "foldland-dart-tools"
    path: https://cspell.foldland.io/v1.25.1/dart/tools.txt
